# Publica o site no GitHub Pages (branch gh-pages) a cada push em main.
# Onde ver: GitHub → aba "Actions" → workflow "Deploy to GitHub Pages".
# Pages: Settings → Pages → Source = branch gh-pages / folder / (root).

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      # Envia o conteúdo de ./dist para a branch gh-pages (é essa branch que o Pages usa).
      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./dist
          force_orphan: true
